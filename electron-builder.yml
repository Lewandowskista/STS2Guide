appId: com.sts2advisor.app
productName: STS2 Advisor
directories:
  output: release
  buildResources: assets
files:
  - dist/**
  - dist-electron/**
  - package.json
  - node_modules/**
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
